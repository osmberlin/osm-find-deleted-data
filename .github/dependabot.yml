version: 2
updates:
  # App dependencies (package.json / bun.lock) — one grouped PR per week.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm:
        patterns: ["*"]

  # GitHub Actions used in the workflows — one grouped PR per week.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]
